    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        :root {
            --navy: #132238;
            --gold: #c5a059;
            --linen: #fcfaf7;
            --white: #ffffff;
            --slate: #546e7a;
            --shadow: 0 12px 40px rgba(0,0,0,0.08);
            --serif: 'Cormorant Garamond', serif;
            --sans: 'Montserrat', sans-serif;
            --script: 'Pinyon Script', cursive;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--sans);
            background-color: var(--linen);
            color: var(--navy);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* ── BACKGROUND ── */
        .starry-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(circle at top right, #ffffff 0%, #f4f7f9 100%);
            pointer-events: none;
        }
        .star {
            position: absolute;
            background: var(--gold);
            border-radius: 50%;
            opacity: 0.4;
            animation: twinkle var(--duration) infinite ease-in-out;
        }
        @keyframes twinkle {
            0%, 100% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.5); opacity: 0.5; }
        }

        /* ── LOGIN ── */
        #login-screen {
            position: fixed;
            inset: 0;
            background: var(--navy);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .login-card {
            background: var(--white);
            padding: 60px 40px;
            text-align: center;
            width: min(420px, 90vw);
            border-radius: 2px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }
        .login-card h1 { font-family: var(--serif); font-size: 2.5rem; margin-bottom: 5px; }
        .login-card p { font-family: var(--script); font-size: 2rem; color: var(--gold); margin-bottom: 30px; }
        .login-card input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            text-align: center;
            font-size: 1rem;
            outline: none;
        }
        .login-card input:focus { border-color: var(--gold); }
        .login-btn {
            background: var(--navy);
            color: white;
            padding: 15px 40px;
            border: none;
            width: 100%;
            cursor: pointer;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        .login-btn:hover { background: var(--gold); }

        /* ── NAVIGATION ── */
        header {
            position: sticky;
            top: 0;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(15px);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .nav-brand { font-family: var(--serif); font-weight: 600; font-size: 1.4rem; color: var(--navy); }
        .nav-controls { display: flex; align-items: center; gap: 15px; }
        .btn-nav {
            background: none;
            border: 1px solid var(--gold);
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 20px;
            font-size: 0.8rem;
            transition: 0.3s;
        }
        .btn-nav:hover { background: var(--gold); color: white; }
        .chapter-select {
            padding: 8px 12px;
            border: none;
            background: var(--linen);
            font-family: var(--sans);
            font-size: 0.85rem;
            color: var(--navy);
            outline: none;
            cursor: pointer;
        }

        /* ── ALBUM LAYOUT ── */
        .container {
            max-width: 1300px;
            margin: 40px auto;
            padding: 0 30px;
            position: relative;
            z-index: 1;
        }

        /* COVER PAGE STYLE */
        .page-cover {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: var(--white);
            min-height: 80vh;
            box-shadow: var(--shadow);
        }
        .cover-content {
            padding: 80px;
            background: var(--navy);
            color: var(--white);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .cover-content h1 { font-family: var(--serif); font-size: 4.5rem; line-height: 1; margin-bottom: 20px; }
        .cover-content p { font-family: var(--script); font-size: 3rem; color: var(--gold); }
        .cover-img { background-size: cover; background-position: center; }

        /* SPREAD STYLE */
        .page-spread {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 50px;
        }
        .story-sidebar {
            background: var(--white);
            padding: 50px;
            height: fit-content;
            position: sticky;
            top: 120px;
            box-shadow: var(--shadow);
        }
        .story-sidebar h2 { font-family: var(--serif); font-size: 2.2rem; margin-bottom: 20px; color: var(--navy); }
        .chapter-label { 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            font-size: 0.7rem; 
            color: var(--gold); 
            margin-bottom: 10px; 
            display: block; 
            font-weight: 600;
        }
        .story-body { font-family: var(--serif); font-size: 1.2rem; font-style: italic; color: var(--slate); }

        /* MASONRY GALLERY */
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            grid-auto-rows: 10px;
            gap: 20px;
        }
        .media-card {
            grid-row-end: span 30; /* Dynamic height later */
            position: relative;
            overflow: hidden;
            background: #eee;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .media-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
        .media-card img, .media-card video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .media-card .overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 20px;
            background: linear-gradient(transparent, rgba(19, 34, 56, 0.8));
            color: white;
            font-size: 0.8rem;
            opacity: 0;
            transition: 0.3s;
        }
        .media-card:hover .overlay { opacity: 1; }
        .video-badge {
            position: absolute;
            top: 15px; left: 15px;
            background: var(--gold);
            color: white;
            padding: 4px 12px;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ── LIGHTBOX ── */
        #lightbox {
            position: fixed;
            inset: 0;
            background: rgba(19, 34, 56, 0.98);
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        #lightbox.active { display: flex; }
        .lb-main { max-width: 90%; max-height: 80vh; position: relative; }
        .lb-main img, .lb-main video { width: 100%; max-height: 80vh; object-fit: contain; }
        .lb-caption { color: var(--gold); margin-top: 20px; font-family: var(--serif); font-size: 1.5rem; text-align: center; }
        .lb-close { position: absolute; top: 30px; right: 40px; color: white; font-size: 2.5rem; cursor: pointer; }
        .lb-btn { position: absolute; top: 50%; color: white; font-size: 3rem; cursor: pointer; padding: 20px; }
        .lb-prev { left: 10px; }
        .lb-next { right: 10px; }

        /* ── FAB ── */
        .fab {
            position: fixed;
            bottom: 30px; right: 30px;
            width: 60px; height: 60px;
            background: var(--navy);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 90;
            transition: 0.3s;
        }
        .fab:hover { background: var(--gold); transform: scale(1.1); }

        @media (max-width: 1000px) {
            .page-cover { grid-template-columns: 1fr; }
            .cover-content { padding: 40px; }
            .cover-img { height: 350px; }
            .page-spread { grid-template-columns: 1fr; }
            .story-sidebar { position: static; }
        }
    </style>

    // ─────────────────────────────────────────────────────────────────────────
    // APP LOGIC
    // ─────────────────────────────────────────────────────────────────────────
    let currentIndex = 0;
    let currentGallery = [];
    let lbIndex = 0;

    function checkAuth() {
        if(document.getElementById('passInput').value.toLowerCase() === 'nawaz') {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            init();
        } else {
            document.getElementById('err').innerText = 'Invalid Code';
        }
    }

    function init() {
        createStars();
        populateNav();
        renderPage();
    }

    function createStars() {
        const field = document.getElementById('starField');
        for(let i=0; i<40; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 'px';
            star.style.width = size; star.style.height = size;
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            field.appendChild(star);
        }
    }

    function populateNav() {
        const sel = document.getElementById('pageSelector');
        ALBUM_PAGES.forEach((p, i) => {
            sel.options[sel.options.length] = new Option(p.label || p.title, i);
        });
    }

    function renderPage() {
        const data = ALBUM_PAGES[currentIndex];
        const container = document.getElementById('pageContent');
        window.scrollTo(0,0);
        
        if(data.type === 'cover' || data.type === 'yearCover') {
            container.innerHTML = `
                <div class="page-cover">
                    <div class="cover-content">
                        <span class="chapter-label">Chapter Collection</span>
                        <h1>${data.title}</h1>
                        <p>${data.subtitle || ''}</p>
                    </div>
                    <div class="cover-img" style="background-image: url('${data.image}')"></div>
                </div>
            `;
            currentGallery = data.images || [];
        } else {
            const allImages = data.images || [];
            const allVideos = data.videos || [];
            currentGallery = [...allImages, ...allVideos];

            container.innerHTML = `
                <div class="page-spread">
                    <div class="story-sidebar">
                        <span class="chapter-label">${data.label}</span>
                        <h2>${data.title}</h2>
                        <div class="story-body">${data.text}</div>
                    </div>
                    <div class="gallery-container">
                        ${allVideos.map((v, i) => `
                            <div class="media-card" onclick="openLightbox(${allImages.length + i})">
                                <span class="video-badge">Video</span>
                                <video src="${v.src}#t=0.1"></video>
                                <div class="overlay">${v.caption}</div>
                            </div>
                        `).join('')}
                        ${allImages.map((img, i) => `
                            <div class="media-card" onclick="openLightbox(${i})">
                                <img src="${img.src}" loading="lazy">
                                <div class="overlay">${img.caption}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        document.getElementById('pageSelector').value = currentIndex;
    }

    function jumpToPage(val) { currentIndex = parseInt(val); renderPage(); }
    function nextPage() { if(currentIndex < ALBUM_PAGES.length - 1) { currentIndex++; renderPage(); } }
    function prevPage() { if(currentIndex > 0) { currentIndex--; renderPage(); } }

    function openLightbox(idx) {
        lbIndex = idx;
        const item = currentGallery[lbIndex];
        const mediaCont = document.getElementById('lbMedia');
        
        if(item.src.includes('.mp4')) {
            mediaCont.innerHTML = `<video src="${item.src}" controls autoplay></video>`;
        } else {
            mediaCont.innerHTML = `<img src="${item.src}">`;
        }
        document.getElementById('lbCaption').innerText = item.caption;
        document.getElementById('lightbox').classList.add('active');
    }

    function closeLightbox() {
        document.getElementById('lightbox').classList.remove('active');
        document.getElementById('lbMedia').innerHTML = '';
    }

    function navLightbox(dir) {
        lbIndex += dir;
        if(lbIndex < 0) lbIndex = currentGallery.length - 1;
        if(lbIndex >= currentGallery.length) lbIndex = 0;
        openLightbox(lbIndex);
    }

    // Key nav
    document.addEventListener('keydown', (e) => {
        if(e.key === 'ArrowRight') document.getElementById('lightbox').classList.contains('active') ? navLightbox(1) : nextPage();
        if(e.key === 'ArrowLeft') document.getElementById('lightbox').classList.contains('active') ? navLightbox(-1) : prevPage();
        if(e.key === 'Escape') closeLightbox();
    });
</script>
